name: Build applications

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            artifact: crash-crafts-game-sync-linux-x86_64
          - name: Windows x86_64
            os: windows-latest
            artifact: crash-crafts-game-sync-windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set date-based version (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION="$(date -u +'%Y.%m%d').${{ github.run_number }}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          sed -i "/^name = \"crash-crafts-game-sync\"/{n;s/^version = \".*\"/version = \"${VERSION}\"/}" Cargo.lock

      - name: Set date-based version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = (Get-Date -Format "yyyy.MMdd") + ".${{ github.run_number }}"
          (Get-Content Cargo.toml) -replace '^version = ".*"', "version = `"$version`"" | Set-Content Cargo.toml
          $content = Get-Content Cargo.lock
          $idx = ($content | Select-String -Pattern '^name = "crash-crafts-game-sync"' | Select-Object -First 1).LineNumber - 1
          if ($idx -ge 0 -and $idx + 1 -lt $content.Count) {
            $content[$idx + 1] = $content[$idx + 1] -replace '^version = ".*"', "version = `"$version`""
          }
          $content | Set-Content Cargo.lock

      - name: Build
        run: cargo build --release --locked --bins

      - name: Linux GUI smoke test
        if: runner.os == 'Linux'
        run: |
          set -eux
          ./target/release/crash-crafts-game-sync-gui --port 17835 --no-browser --config /tmp/desktop-config.json &
          GUI_PID=$!
          # The GUI server writes its per-process bearer token to the hint
          # file immediately after binding, before accepting requests.
          # Wait for the file to appear (proves the server is ready).
          TOKEN_FILE="${HOME}/.local/state/crash-crafts-game-sync/gui-token"
          for i in $(seq 1 20); do
            if [ -s "$TOKEN_FILE" ]; then break; fi
            sleep 0.5
          done
          if [ ! -s "$TOKEN_FILE" ]; then
            echo "GUI server did not start in time" >&2
            kill "$GUI_PID" || true
            exit 1
          fi
          LOCAL_TOKEN="$(cat "$TOKEN_FILE")"
          # Unauthenticated requests: only static assets are public.
          curl -fsS http://127.0.0.1:17835/ >/dev/null
          # Authenticated API requests.
          curl -fsS -H "Authorization: Bearer ${LOCAL_TOKEN}" http://127.0.0.1:17835/api/local/status
          curl -fsS -H "Authorization: Bearer ${LOCAL_TOKEN}" http://127.0.0.1:17835/api/local/emulators >/dev/null
          kill "$GUI_PID"

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends rpm

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: |
          set -eux
          version="$(grep '^version =' Cargo.toml | head -1 | cut -d '"' -f 2)"
          binary="target/release/crash-crafts-game-sync"
          gui_binary="target/release/crash-crafts-game-sync-gui"

          mkdir -p dist/tar/linux-packaging
          cp "${binary}" "${gui_binary}" dist/tar/
          cp -R packaging/linux/. dist/tar/linux-packaging/
          cp -R packaging/steam-deck dist/tar/steam-deck-packaging
          tar -czf "${{ matrix.artifact }}.tar.gz" -C dist/tar .

          deb_root="dist/debian-root"
          install -Dm0755 "${binary}" "${deb_root}/usr/bin/crash-crafts-game-sync"
          install -Dm0755 "${gui_binary}" "${deb_root}/usr/bin/crash-crafts-game-sync-gui"
          install -Dm0644 packaging/linux/crash-crafts-game-sync.desktop "${deb_root}/usr/share/applications/crash-crafts-game-sync.desktop"
          install -Dm0644 packaging/linux/crash-crafts-game-sync.service "${deb_root}/usr/lib/systemd/user/crash-crafts-game-sync.service"
          install -Dm0644 packaging/linux/debian/control "${deb_root}/DEBIAN/control"
          sed -i "s/@VERSION@/${version}/" "${deb_root}/DEBIAN/control"
          dpkg-deb --build --root-owner-group "${deb_root}" "${{ matrix.artifact }}.deb"

          rpmbuild_root="${PWD}/dist/rpmbuild"
          mkdir -p "${rpmbuild_root}"/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp "${binary}" "${rpmbuild_root}/SOURCES/crash-crafts-game-sync"
          cp "${gui_binary}" "${rpmbuild_root}/SOURCES/crash-crafts-game-sync-gui"
          cp packaging/linux/crash-crafts-game-sync.desktop "${rpmbuild_root}/SOURCES/"
          cp packaging/linux/crash-crafts-game-sync.service "${rpmbuild_root}/SOURCES/"
          # Provide an empty placeholder icon so the spec's install line
          # succeeds even when the real icon hasn't been committed yet.
          : > "${rpmbuild_root}/SOURCES/crash-crafts-game-sync.png"
          cp packaging/linux/rpm/crash-crafts-game-sync.spec "${rpmbuild_root}/SPECS/"
          rpmbuild -bb --define "_topdir ${rpmbuild_root}" --define "version ${version}" "${rpmbuild_root}/SPECS/crash-crafts-game-sync.spec"
          cp "${rpmbuild_root}"/RPMS/*/*.rpm "${{ matrix.artifact }}.rpm"

          mkdir -p dist/aur/crash-crafts-game-sync
          cp packaging/linux/aur/PKGBUILD packaging/linux/aur/.SRCINFO dist/aur/crash-crafts-game-sync/
          cp packaging/linux/crash-crafts-game-sync.desktop packaging/linux/crash-crafts-game-sync.service dist/aur/crash-crafts-game-sync/
          tar -czf "${{ matrix.artifact }}-aur.tar.gz" -C dist/aur crash-crafts-game-sync

          # Decky helper bundle — usable on every Linux distro that runs Decky
          # Loader (SteamOS, Arch, Debian, RPM, AppImage/Flatpak setups).
          tar -czf "${{ matrix.artifact }}-decky-helper.tar.gz" -C packaging/steam-deck decky-plugin

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\windows-packaging -Force | Out-Null
          Copy-Item target\release\crash-crafts-game-sync.exe dist\
          Copy-Item target\release\crash-crafts-game-sync-gui.exe dist\
          Copy-Item packaging\windows\Product.wxs dist\windows-packaging\
          Compress-Archive -Path dist\* -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.deb
            ${{ matrix.artifact }}.rpm
            ${{ matrix.artifact }}-aur.tar.gz
            ${{ matrix.artifact }}-decky-helper.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: error
