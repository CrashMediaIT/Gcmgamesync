<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Crash Crafts Game Sync Docker Web UI dashboard</title>
  <desc id="desc">Post-setup management console served by the Docker container on port 8080. Sidebar navigation (Dashboard, Devices, Files, Users, Invites, Logs, Settings, Emulators) with stat tiles and recent activity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="1" stop-color="#101727"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ff7a18"/>
      <stop offset="1" stop-color="#23d5ab"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="720" fill="#0a0f1c"/>
  <text x="24" y="48" fill="url(#accent)" font-family="Inter,Arial" font-size="20" font-weight="700" filter="url(#glow)">Crash Crafts</text>
  <text x="24" y="68" fill="#7d8aa6" font-family="Inter,Arial" font-size="12">Game Sync</text>
  <g font-family="Inter,Arial" font-size="14" fill="#b9c4dc">
    <rect x="12" y="100" width="196" height="32" rx="6" fill="#172238"/>
    <text x="28" y="121" fill="#ffffff">Dashboard</text>
    <text x="28" y="161">Devices</text>
    <text x="28" y="193">Files</text>
    <text x="28" y="225">Users / Invites</text>
    <text x="28" y="257">Logs</text>
    <text x="28" y="289">Emulators (admin)</text>
    <text x="28" y="321">Settings</text>
  </g>
  <text x="24" y="690" fill="#7d8aa6" font-family="Inter,Arial" font-size="11">admin@example.com · 2FA on</text>
  <!-- Header -->
  <rect x="220" y="0" width="980" height="64" fill="#0d1424"/>
  <text x="244" y="40" fill="#ffffff" font-family="Inter,Arial" font-size="18" font-weight="600">Dashboard</text>
  <circle cx="1140" cy="32" r="6" fill="#23d5ab"/>
  <text x="1100" y="36" fill="#7d8aa6" font-family="Inter,Arial" font-size="12" text-anchor="end">Healthy</text>
  <!-- Stat tiles -->
  <g font-family="Inter,Arial">
    <g>
      <rect x="244" y="92" width="220" height="110" rx="10" fill="#142036" stroke="#1f2c47"/>
      <text x="264" y="124" fill="#7d8aa6" font-size="12">USERS</text>
      <text x="264" y="172" fill="#ffffff" font-size="36" font-weight="700">4</text>
    </g>
    <g>
      <rect x="478" y="92" width="220" height="110" rx="10" fill="#142036" stroke="#1f2c47"/>
      <text x="498" y="124" fill="#7d8aa6" font-size="12">DESKTOP DEVICES</text>
      <text x="498" y="172" fill="#ffffff" font-size="36" font-weight="700">7</text>
    </g>
    <g>
      <rect x="712" y="92" width="220" height="110" rx="10" fill="#142036" stroke="#1f2c47"/>
      <text x="732" y="124" fill="#7d8aa6" font-size="12">SYNCED SAVES</text>
      <text x="732" y="172" fill="#ffffff" font-size="36" font-weight="700">128</text>
    </g>
    <g>
      <rect x="946" y="92" width="220" height="110" rx="10" fill="#142036" stroke="#1f2c47"/>
      <text x="966" y="124" fill="#7d8aa6" font-size="12">VERSIONS KEPT</text>
      <text x="966" y="172" fill="#ffffff" font-size="36" font-weight="700">512</text>
    </g>
  </g>
  <!-- Devices table -->
  <g font-family="Inter,Arial">
    <text x="244" y="240" fill="#ffffff" font-size="16" font-weight="600">Recent device health</text>
    <rect x="244" y="252" width="922" height="180" rx="10" fill="#0f1828" stroke="#1f2c47"/>
    <g fill="#7d8aa6" font-size="12">
      <text x="264" y="278">HOSTNAME</text>
      <text x="464" y="278">OS</text>
      <text x="584" y="278">LAST SYNC</text>
      <text x="734" y="278">RESULT</text>
      <text x="884" y="278">EMULATOR ROOT</text>
    </g>
    <g fill="#dde6f7" font-size="13">
      <text x="264" y="308">deck-living-room</text>
      <text x="464" y="308">SteamOS</text>
      <text x="584" y="308">2m ago</text>
      <text x="734" y="308" fill="#23d5ab">ok · 6 pushed</text>
      <text x="884" y="308">/home/deck/Emu</text>
      <text x="264" y="338">workshop-pc</text>
      <text x="464" y="338">Windows 11</text>
      <text x="584" y="338">14m ago</text>
      <text x="734" y="338" fill="#23d5ab">ok · 0 pushed</text>
      <text x="884" y="338">D:\Emulators</text>
      <text x="264" y="368">linux-laptop</text>
      <text x="464" y="368">Arch</text>
      <text x="584" y="368">1h ago</text>
      <text x="734" y="368" fill="#ff7a18">retry · 1 error</text>
      <text x="884" y="368">/opt/emu</text>
      <text x="264" y="398">deck-bedroom</text>
      <text x="464" y="398">SteamOS</text>
      <text x="584" y="398">3h ago</text>
      <text x="734" y="398" fill="#23d5ab">ok · 2 pushed</text>
      <text x="884" y="398">/home/deck/Emu</text>
    </g>
  </g>
  <!-- Activity -->
  <g font-family="Inter,Arial">
    <text x="244" y="472" fill="#ffffff" font-size="16" font-weight="600">Recent activity</text>
    <rect x="244" y="484" width="922" height="200" rx="10" fill="#0f1828" stroke="#1f2c47"/>
    <g fill="#dde6f7" font-size="13">
      <text x="264" y="510">2026-04-27 02:24 · deck-living-room pushed pcsx2/memcards/Mcd001.ps2 (rev 4)</text>
      <text x="264" y="534">2026-04-27 02:23 · workshop-pc pulled rpcs3/dev_hdd0/home/SAVEDATA (rev 2)</text>
      <text x="264" y="558">2026-04-27 02:18 · admin@example.com restored duckstation/memcards/card1.mcd to v1</text>
      <text x="264" y="582">2026-04-27 02:10 · admin@example.com published Cemu update 2.6 → 2.7 to all users</text>
      <text x="264" y="606">2026-04-27 02:01 · linux-laptop heartbeat (Arch) emulator_root=/opt/emu</text>
      <text x="264" y="630">2026-04-27 01:50 · invite issued to friend@example.com</text>
      <text x="264" y="654">2026-04-27 01:42 · deck-bedroom installed RetroArch 1.20 portable</text>
    </g>
  </g>
</svg>
