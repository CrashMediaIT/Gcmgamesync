<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="-apple-system,Segoe UI,Inter,Helvetica,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#121826"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7a2a"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="880" height="540" fill="url(#bg)"/>
  <!-- Window chrome -->
  <rect x="20" y="20" width="840" height="500" rx="14" fill="#0f1524" stroke="#1f2a3a" stroke-width="1"/>
  <circle cx="40" cy="40" r="6" fill="#ff5f57"/>
  <circle cx="60" cy="40" r="6" fill="#febc2e"/>
  <circle cx="80" cy="40" r="6" fill="#28c840"/>
  <text x="420" y="44" fill="#9aa6b8" font-size="12" text-anchor="middle">Crash Crafts Game Sync — Desktop GUI</text>
  <!-- Header bar -->
  <rect x="36" y="62" width="808" height="56" rx="10" fill="#101a2c" stroke="#1f2a3a"/>
  <text x="56" y="86" fill="#e5e7eb" font-size="16" font-weight="600">Crash Crafts Game Sync</text>
  <text x="56" y="106" fill="#9aa6b8" font-size="12">user@crashcrafts.com · https://sync.example.com</text>
  <circle cx="800" cy="90" r="6" fill="#22d3ee"/>
  <text x="780" y="94" fill="#22d3ee" font-size="12" text-anchor="end">Connected</text>
  <!-- Tabs -->
  <rect x="36" y="128" width="808" height="36" rx="8" fill="#0d1422"/>
  <rect x="42" y="132" width="92" height="28" rx="6" fill="url(#header)"/>
  <text x="88" y="151" fill="#0b0f1a" font-size="12" font-weight="700" text-anchor="middle">Status</text>
  <text x="170" y="151" fill="#9aa6b8" font-size="12" text-anchor="middle">Emulators</text>
  <text x="240" y="151" fill="#9aa6b8" font-size="12" text-anchor="middle">SRM</text>
  <text x="310" y="151" fill="#9aa6b8" font-size="12" text-anchor="middle">Folders</text>
  <text x="385" y="151" fill="#9aa6b8" font-size="12" text-anchor="middle">Activity</text>
  <text x="460" y="151" fill="#9aa6b8" font-size="12" text-anchor="middle">Settings</text>
  <!-- Status tiles -->
  <rect x="36" y="178" width="252" height="120" rx="10" fill="#101a2c" stroke="#1f2a3a"/>
  <text x="52" y="202" fill="#9aa6b8" font-size="11">CURRENT STATE</text>
  <text x="52" y="232" fill="#22d3ee" font-size="22" font-weight="700">Idle</text>
  <text x="52" y="258" fill="#e5e7eb" font-size="12">Last sync 14s ago</text>
  <text x="52" y="278" fill="#9aa6b8" font-size="11">3 pushed · 1 pulled · 0 errors</text>

  <rect x="300" y="178" width="252" height="120" rx="10" fill="#101a2c" stroke="#1f2a3a"/>
  <text x="316" y="202" fill="#9aa6b8" font-size="11">EMULATOR INSTALL ROOT</text>
  <text x="316" y="232" fill="#e5e7eb" font-size="13">/games/emulators</text>
  <text x="316" y="258" fill="#9aa6b8" font-size="11">ROM LIBRARY ROOT</text>
  <text x="316" y="278" fill="#e5e7eb" font-size="13">/games/roms</text>

  <rect x="564" y="178" width="280" height="120" rx="10" fill="#101a2c" stroke="#1f2a3a"/>
  <text x="580" y="202" fill="#9aa6b8" font-size="11">QUICK ACTIONS</text>
  <rect x="580" y="216" width="120" height="32" rx="6" fill="url(#header)"/>
  <text x="640" y="237" fill="#0b0f1a" font-size="13" font-weight="700" text-anchor="middle">Sync now</text>
  <rect x="710" y="216" width="120" height="32" rx="6" fill="#1f2a3a"/>
  <text x="770" y="237" fill="#e5e7eb" font-size="13" text-anchor="middle">Pause</text>
  <text x="580" y="278" fill="#9aa6b8" font-size="11">Closing the window minimizes to tray</text>

  <!-- Recent activity -->
  <rect x="36" y="312" width="808" height="190" rx="10" fill="#101a2c" stroke="#1f2a3a"/>
  <text x="52" y="336" fill="#e5e7eb" font-size="13" font-weight="600">Recent activity</text>
  <text x="52" y="362" fill="#22d3ee" font-size="12">↑ duckstation/memcards/Slot1.mcd  · 64 KB · 2s ago</text>
  <text x="52" y="384" fill="#22d3ee" font-size="12">↑ pcsx2-nightly/memcards/Mcd001.ps2  · 8 KB · 5s ago</text>
  <text x="52" y="406" fill="#ff7a2a" font-size="12">↓ cemu/mlc01/usr/save/00050000/.../user/savedata.sav  · 2 KB · 7s ago</text>
  <text x="52" y="428" fill="#9aa6b8" font-size="12">⊘ skipped duckstation/settings.ini (controller/config — device-local)</text>
  <text x="52" y="450" fill="#9aa6b8" font-size="12">⊘ skipped pcsx2-nightly/inis/PAD.ini (controller/config — device-local)</text>
  <text x="52" y="478" fill="#9aa6b8" font-size="11">Push and pull use the same path-based remote storage so Linux saves restore on Windows and vice versa.</text>
</svg>
