<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Crash Crafts Game Sync Docker pull and CLI screenshot</title>
  <desc id="desc">Terminal output for pulling the Docker image and running the CLI status command.</desc>
  <rect width="1200" height="540" rx="0" fill="#070a12"/>
  <rect x="72" y="54" width="1056" height="432" rx="22" fill="#0c121f" stroke="#ffffff" stroke-opacity=".14"/>
  <rect x="72" y="54" width="1056" height="54" rx="22" fill="#111827"/>
  <circle cx="105" cy="81" r="8" fill="#ff5f56"/>
  <circle cx="132" cy="81" r="8" fill="#ffbd2e"/>
  <circle cx="159" cy="81" r="8" fill="#27c93f"/>
  <text x="198" y="87" fill="#aab7cf" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">docker pull ghcr.io/crashmediait/gcmgamesync:latest</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21">
    <text x="112" y="150" fill="#22d3ee">$ docker pull ghcr.io/crashmediait/gcmgamesync:latest</text>
    <text x="112" y="186" fill="#aab7cf">latest: Pulling from crashmediait/gcmgamesync</text>
    <text x="112" y="222" fill="#7ee787">Status: Downloaded newer image for ghcr.io/crashmediait/gcmgamesync:latest</text>
    <text x="112" y="276" fill="#22d3ee">$ cargo run -- status --root /games/emulators</text>
    <text x="112" y="312" fill="#f8fafc">{ "detected": [{ "id": "duckstation", "portable": true }],</text>
    <text x="112" y="348" fill="#f8fafc">  "errors": [], "portable_mode_required": [] }</text>
    <text x="112" y="402" fill="#22d3ee">$ crash-crafts-game-sync healthcheck</text>
    <text x="112" y="438" fill="#7ee787">OK</text>
  </g>
</svg>
